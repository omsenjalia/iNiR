name: Weekly Summary

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at 00:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate week info
        id: week-calc
        run: |
          END_OF_WEEK=$(date -u -d "last saturday" +%d/%m/%y)
          START_OF_WEEK=$(date -u -d "last saturday - 6 days" +%d/%m/%y)
          TODAY=$(date -u +%d/%m/%y)

          MONTH=$(date -u -d "last saturday" +%B | tr '[:upper:]' '[:lower:]')
          DAY_OF_MONTH=$(date -u -d "last saturday - 6 days" +%d)
          WEEK_IN_MONTH=$(( (DAY_OF_MONTH - 1) / 7 + 1 ))

          echo "start_date=$START_OF_WEEK" >> $GITHUB_OUTPUT
          echo "end_date=$END_OF_WEEK" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "month=$MONTH" >> $GITHUB_OUTPUT
          echo "week_in_month=$WEEK_IN_MONTH" >> $GITHUB_OUTPUT
          echo "filename=${MONTH}-week-${WEEK_IN_MONTH}.md" >> $GITHUB_OUTPUT

          echo "Week: $START_OF_WEEK to $END_OF_WEEK"

      - name: Check for changelog entries
        id: collect
        run: |
          CHANGELOG_DIR="docs/src/content/docs/ai-agents/changelog"
          COUNT=$(find "$CHANGELOG_DIR" -name "*.md" -type f 2>/dev/null | wc -l)

          if [ "$COUNT" -eq 0 ]; then
            echo "No changelog entries found"
            echo "has_entries=false" >> $GITHUB_OUTPUT
          else
            echo "Found $COUNT changelog entries"
            echo "has_entries=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate weekly summary from all changelog entries
        if: steps.collect.outputs.has_entries == 'true'
        run: |
          FILENAME=${{ steps.week-calc.outputs.filename }}
          CHANGELOG_DIR="docs/src/content/docs/ai-agents/changelog"

          mkdir -p docs/src/content/docs/ai-agents/weekly-summaries
          FILE_PATH="docs/src/content/docs/ai-agents/weekly-summaries/$FILENAME"

          # Write frontmatter
          {
            echo "---"
            echo "title: \"Weekly Summary: ${{ steps.week-calc.outputs.month }} week ${{ steps.week-calc.outputs.week_in_month }}\""
            echo "date: ${{ steps.week-calc.outputs.today }}"
            echo "week_start: ${{ steps.week-calc.outputs.start_date }}"
            echo "week_end: ${{ steps.week-calc.outputs.end_date }}"
            echo "---"
            echo ""
          } > "$FILE_PATH"

          # Compile all changelog entries, preserving their full structure
          # (Changed Files, Commit Message, AI Agent Notes)
          for f in $(ls -1 "$CHANGELOG_DIR"/*.md 2>/dev/null | sort); do
            [ -f "$f" ] || continue

            # Extract metadata from frontmatter
            entry_title=$(sed -n 's/^title: *"\(.*\)"/\1/p' "$f" | head -1)
            entry_date=$(sed -n 's/^date: *//p' "$f" | head -1)
            entry_commit=$(sed -n 's/^commit: *//p' "$f" | head -1)
            entry_author=$(sed -n 's/^author: *//p' "$f" | head -1)
            short_sha="${entry_commit:0:7}"

            # Convert date to dd/mm/yy if in YYYY-MM-DD format
            if [[ "$entry_date" =~ ^([0-9]{4})-([0-9]{2})-([0-9]{2})$ ]]; then
              entry_date="${BASH_REMATCH[3]}/${BASH_REMATCH[2]}/${BASH_REMATCH[1]:2:2}"
            fi

            # Extract body (everything after the closing --- of frontmatter)
            body=$(awk 'BEGIN{n=0} /^---$/{n++; next} n>=2{print}' "$f")

            {
              echo "### ${entry_title}"
              echo ""
              echo "**Date:** ${entry_date} | **Author:** ${entry_author} | **Commit:** \`${short_sha}\`"
              echo ""
              echo "$body"
              echo ""
              echo "---"
              echo ""
            } >> "$FILE_PATH"
          done

          echo "Generated weekly summary at $FILE_PATH"

      - name: Delete all changelog entries
        if: steps.collect.outputs.has_entries == 'true'
        run: |
          CHANGELOG_DIR="docs/src/content/docs/ai-agents/changelog"
          echo "Deleting all changelog entries..."
          find "$CHANGELOG_DIR" -name "*.md" -type f -print -delete

      - name: Commit weekly summary and changelog deletions
        if: steps.collect.outputs.has_entries == 'true'
        run: |
          git add docs/src/content/docs/ai-agents/weekly-summaries/
          git add docs/src/content/docs/ai-agents/changelog/ || true
          if ! git diff --cached --quiet; then
            git commit -m "docs(weekly-summary): add ${{ steps.week-calc.outputs.filename }} and remove weekly changelog entries"
            git push
          fi
